    ${coachCtx&&conflicts.length?`<div class="alert-box mt-4"><span class="dot"></span><div><b>Scheduling conflicts to review:</b> ${conflicts.map(esc).join(" · ")}</div></div>`:""}
    ${!coachCtx?`<p class="xs muted mt-4">Open any track for the full detail — your standalone pages still work too.</p>`:""}`;
}

/* ---------------- COACH PAGES ---------------- */
function priorityFeed(){
  const out=[]; const today=iso(TODAY);
  perfAthletes().forEach(c=>{ const id=c.id; const a=latestAssessment(id); const prof=profileOf(id);
    const add=(type,sev,reason,action)=>out.push({id, name:c.name, type, severity:sev, date:a?a.date:today, reason, action});
    if(a){
      if(a.ai_readiness<60) add("Low readiness","high","Latest readiness "+a.ai_readiness+".","Consider reducing load; review before high-intent work.");
      if(a.pain>=4) add("Pain reported","high","Arm discomfort "+a.pain+"/10.","Monitor closely and follow up before throwing.");
      if(a.arm_fatigue>=7) add("Arm-fatigue spike","med","Arm fatigue "+a.arm_fatigue+"/10.","Consider a recovery-focused day.");
      if(a.injury_location && a.injury_location!=="none") add("Injury flag","high",a.injury_location+" noted.","Follow up and adjust the plan.");
    } else add("Missed assessment","med","No daily assessment logged today.","Nudge the athlete to check in.");
    const recentThr=THROWING_SESSIONS.filter(t=>t.athlete_id===id && t.date>=iso(addDays(TODAY,-7)));
    const pc=recentThr.reduce((s,t)=>s+(t.pitch_count||0),0);
    if(pc>120) add("High throwing workload","med",pc+" pitches in 7 days.","Consider lightening upcoming volume.");
    const missedLift=WORKOUT_SCHEDULE.some(w=>w.athlete_id===id && w.date<today && w.status==="scheduled");
    if(missedLift) add("Missed workout","low","A scheduled lift was not completed.","Reschedule or check in.");
    const soon=THROWING_SESSIONS.find(t=>t.athlete_id===id && t.date>=today && t.date<=iso(addDays(TODAY,2)) && t.intensity==="high");
    if(soon && a && a.ai_readiness<65) add("High-intent throw after poor recovery","high","Bullpen/game on "+fmtDateShort(parseISO(soon.date))+" with readiness "+a.ai_readiness+".","Consider pushing the session or lowering intensity.");
  });
  const rank={high:0,med:1,low:2};
  return out.sort((x,y)=>rank[x.severity]-rank[y.severity]);
}

/* ---------------- PERFORMANCE HANDLERS ---------------- */
handleAction["save-assessment"] = ()=>{
  const g=id=>{const n=document.getElementById(id); return n?n.value:"";};
  const raw={ sleep_hours:parseFloat(g("as-sleep")), soreness:Number(g("as-sore")), arm_fatigue:Number(g("as-fat")), pain:Number(g("as-pain")), mood:g("as-mood"), injury_location:g("as-injloc"), injury_onset:g("as-injonset") };
  const data={}; Object.keys(raw).forEach(k=>{ const v=raw[k]; if(v===""||v==null||(typeof v==="number"&&isNaN(v))) return; data[k]=v; });
  const target=state.perf.athlete; const byCoach=isCoachView();
  const a=Object.assign({ id:newAssessId(), athlete_id:target, created_by_id: byCoach?"c1":target, date:iso(TODAY), injury_location:"none", injury_onset:"none" }, data);
  a.readiness=computeReadiness(a);
  try{ const ai=aiAssessment(a); a.ai_readiness=ai.ai_readiness; a.ai_recommendation=ai.ai_recommendation; }
  catch(e){ a.ai_readiness=a.readiness; a.ai_recommendation="Saved — readiness recorded."; }
  const dupIx=ARM_ASSESSMENTS.findIndex(x=>x.athlete_id===target && x.date===a.date);
  if(dupIx>=0){ a.created_by_id=ARM_ASSESSMENTS[dupIx].created_by_id||a.created_by_id; ARM_ASSESSMENTS[dupIx]=a; }  // one per day: update, don't stack
  else ARM_ASSESSMENTS.unshift(a);
  if(byCoach) coachLog("readiness","Logged daily assessment","", "readiness "+a.ai_readiness, "Coach entry for athlete", false);
  toast("Assessment saved — readiness "+a.ai_readiness);
  state.page = byCoach?"p-athlete":"p-assessment"; if(byCoach) state.perf.tab="assessment"; render();
};
handleAction["gen-workout"] = ()=>{ const id=state.perf.athlete; const old=WORKOUT_PLANS.findIndex(w=>w.athlete_id===id&&w.plan&&w.plan.weeks); const np=genWorkoutPlan(id); if(old>=0){ coachLog("lifting","Regenerated full 4-week plan","prev plan","new plan","Coach regeneration",true); WORKOUT_PLANS[old]=np; } else { WORKOUT_PLANS.push(np); coachLog("lifting","Generated 4-week plan","","new plan","Coach generated",true); } toast("4-week plan generated"); render(); };
handleAction["regen-day"] = el=>{ const id=state.perf.athlete; const plan=planFor(id); if(plan){ regenWorkoutDay(plan, Number(el.dataset.wi), Number(el.dataset.di), "Manual regenerate"); toast("Day regenerated to latest readiness"); render(); } };
handleAction["edit-day"] = el=>{
  const id=state.perf.athlete; const plan=planFor(id); const wi=Number(el.dataset.wi), di=Number(el.dataset.di);
  const day=planWeeks(plan)[wi].days[di]; const prevFocus=day.focus;
  const lifts=day.main_lifts||[];
  const fields=[{key:"focus",label:"Day focus",type:"text",value:day.focus},{key:"rationale",label:"Coaching rationale",type:"textarea",value:day.coaching_rationale}]
    .concat(lifts.map((l,i)=>({key:"lift"+i,label:"Main lift "+(i+1)+" (name | sets | reps | load)",type:"text",value:[l.name,l.sets,l.reps,l.load].join(" | ")})));
  openModal({ title:"Edit "+day.day, wide:true, fields, submitLabel:"Save day",
    onSubmit:data=>{ const prev=lifts.map(l=>l.name+" "+l.load).join(", "); day.focus=data.focus; day.coaching_rationale=data.rationale;
      lifts.forEach((l,i)=>{ const parts=(data["lift"+i]||"").split("|").map(s=>s.trim()); if(parts[0])l.name=parts[0]; if(parts[1])l.sets=parts[1]; if(parts[2])l.reps=parts[2]; if(parts[3])l.load=parts[3]; });
      coachLog("lifting","Edited "+day.day+" (week "+(wi+1)+")",prevFocus+" / "+prev,day.focus+" / "+lifts.map(l=>l.name+" "+l.load).join(", "),"Manual edit",false);
      closeModal(); toast("Day updated"); render(); } });
};
handleAction["gen-nutrition"] = ()=>{ const id=state.perf.athlete; const i=NUTRITION_ITINERARIES.findIndex(n=>n.athlete_id===id); const ni=genNutritionItinerary(id); if(i>=0){ NUTRITION_ITINERARIES[i]=ni; coachLog("nutrition","Regenerated itinerary","","week plan","Coach regeneration",true); } else { NUTRITION_ITINERARIES.push(ni); coachLog("nutrition","Generated itinerary","","week plan","Coach generated",true); } toast("Nutrition itinerary generated"); render(); };
handleAction["edit-nutri-day"] = el=>{ const id=state.perf.athlete; const it=NUTRITION_ITINERARIES.find(n=>n.athlete_id===id); const d=it.days[Number(el.dataset.di)];

handleAction["gen-mental"] = ()=>{ const id=state.perf.athlete;

  openModal({ title:"Mental Performance Assessment", desc:"A few quick questions build your action plan.", fields:[

};
handleAction["mark-technique"] = el=>{ const id=state.perf.athlete; TASK_COMPLETIONS.unshift({id:"tc"+Date.now(),athlete_id:id,date:iso(TODAY),task_type:"mental_technique",ref_id:el.dataset.type,label:el.dataset.label,completed:true}); toast("Nice — "+el.dataset.label+" logged"); render(); };

handleAction["gen-report"] = ()=>{ const id=state.perf.athlete; const r=genWeeklyReport(id, iso(WEEK0)); const i=WEEKLY_REPORTS.findIndex(x=>x.id===r.id); if(i>=0)WEEKLY_REPORTS[i]=r; else WEEKLY_REPORTS.push(r); toast("Weekly report generated"); render(); };
handleAction["add-lift"] = ()=>{ const id=state.perf.athlete; const plan=planFor(id);
  openModal({ title:"Add lift day", fields:[{key:"date",label:"Date",type:"date",value:iso(TODAY)},{key:"focus",label:"Focus",type:"text",value:"Lower power",required:true}], submitLabel:"Add",
    onSubmit:data=>{ WORKOUT_SCHEDULE.push({id:newWSId(),athlete_id:id,date:data.date,title:data.focus,focus:data.focus,plan_id:plan?plan.id:null,week_index:0,day_index:0,status:"scheduled"}); coachLog("lifting","Added lift day","",data.focus+" on "+data.date,"Coach added",false); closeModal(); toast("Lift day added"); render(); } }); };
handleAction["lift-open"] = ()=>{ if(isCoachView()){ state.perf.tab="lifting"; state.page="p-athlete"; } else { state.page="p-lifting"; } render(); };
handleAction["backfill-ids"] = ()=>{ let n=0; [ARM_ASSESSMENTS,THROWING_SESSIONS].forEach(arr=>arr.forEach(r=>{ if(!r.athlete_id && r.created_by_id){ r.athlete_id=r.created_by_id; n++; } })); toast("Backfilled "+n+" record(s)"); };

/* ---------------- drag & drop: move lift days (coach) ---------------- */
document.addEventListener("dragstart", e=>{ const el=e.target.closest&&e.target.closest("[data-lift-drag]"); if(el && isCoachView()){ state.perf.dragId=el.dataset.liftDrag; if(e.dataTransfer)e.dataTransfer.effectAllowed="move"; } });
